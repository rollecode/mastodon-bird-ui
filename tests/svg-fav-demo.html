<!doctype html><html><head><meta charset="utf-8"><title>Bird UI fav burst</title>
<style>
  body{margin:0;font-family:sans-serif;display:flex;min-height:100vh}
  .pane{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
  .dark{background:#191b22;color:#fff}.light{background:#f4f7fb;color:#222}
  .btn{position:relative;width:160px;height:160px;border:0;background:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
  .glyph{width:150px;height:150px;transform-origin:center;z-index:2;position:relative}
  .glyph .outline{fill:#717c9b}.light .glyph .outline{fill:#717c9b}
  .glyph .fill{display:none}
  .heart.activate .glyph .fill{display:inline;fill:#F91880}.star.activate .glyph .fill{display:inline;fill:#ffac33}
  .activate .glyph .outline{display:none}
  .activate .glyph{animation:glyph .85s cubic-bezier(.17,.89,.32,1.28) forwards}
  @keyframes glyph{0%{transform:scale(1)}10%{transform:scale(0)}28%{transform:scale(0)}55%{transform:scale(1.2)}72%{transform:scale(.92)}100%{transform:scale(1)}}

  .burst{position:absolute;left:50%;top:50%;width:360px;height:360px;transform:translate(-50%,-50%);pointer-events:none;z-index:1;overflow:visible}
  .flashring,.grp{transform-box:fill-box;transform-origin:center;opacity:0}
  .flashring{fill:none}
  .heart .activate{}
  .activate .flashring{animation:fr .52s ease-out forwards}
  @keyframes fr{0%{transform:scale(.3);opacity:1;stroke-width:90;stroke:#dd4688}24%{transform:scale(1);opacity:1;stroke-width:84;stroke:#cc8ef5}33%{transform:scale(1.06);opacity:1;stroke-width:7}100%{transform:scale(1.45);opacity:0;stroke-width:0}}
  @keyframes frs{0%{transform:scale(.3);opacity:1;stroke-width:46}18%{transform:scale(1);opacity:1;stroke-width:44}27%{transform:scale(1.05);opacity:1;stroke-width:5}100%{transform:scale(1.25);opacity:0;stroke-width:0}}
  .heart .flashring{stroke:#cc8ef5}
  .star .flashring{stroke:#ffa017}
  .star.activate .flashring{animation-name:frs}

  /* heart: two clustered confetti waves */
  .activate .w1{animation:burst .5s ease-out .15s forwards}
  .activate .w2{animation:burst .5s ease-out .24s forwards}
  @keyframes burst{0%{transform:scale(0);opacity:1}65%{opacity:1}100%{transform:scale(1.05);opacity:0}}

  /* star: rays first (early), then balls (later) */
  .activate .srays{animation:srays .36s ease-out .08s forwards}
  @keyframes sout{0%{transform:scale(0);opacity:1}55%{opacity:1}100%{transform:scale(1.15);opacity:0}}
  @keyframes srays{0%{transform:scale(.5);opacity:0}30%{transform:scale(1);opacity:1}55%{opacity:1}100%{transform:scale(1.5);opacity:0}}
  .activate .sballs{animation:sout .5s ease-out .28s forwards}

  .replay{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#313543;color:#fff;border:0;padding:10px 16px;border-radius:6px;cursor:pointer;z-index:9}
  .lbl{font-size:14px;opacity:.7}
</style></head><body>
  <div class="pane dark"><button class="btn heart" id="heart">
    <svg class="burst" viewBox="-100 -100 200 200">
      <circle class="flashring" r="40"></circle>
      <g class="grp w1" id="hw1"></g>
      <g class="grp w2" id="hw2"></g>
    </svg>
    <svg class="glyph" viewBox="0 0 24 24"><path class="outline" d="M16.5 3C19.538 3 22 5.5 22 9c0 7-7.5 11-10 12.5C9.5 20 2 16 2 9c0-3.5 2.5-6 5.5-6C9.36 3 11 4 12 5c1-1 2.64-2 4.5-2zm-3.566 15.604a26.953 26.953 0 0 0 2.42-1.701C18.335 14.533 20 11.943 20 9c0-2.36-1.537-4-3.5-4c-1.076 0-2.24.57-3.086 1.414L12 7.828l-1.414-1.414C9.74 5.57 8.576 5 7.5 5C5.56 5 4 6.656 4 9c0 2.944 1.666 5.533 4.645 7.903c.745.592 1.54 1.145 2.421 1.7c.299.189.595.37.934.572c.339-.202.635-.383.934-.571z"></path><path class="fill" d="M20.884 13.19c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"></path></svg>
  </button><div class="lbl">Heart</div></div>

  <div class="pane light"><button class="btn star" id="star">
    <svg class="burst" viewBox="-100 -100 200 200">
      <circle class="flashring" r="20"></circle>
      <g class="grp srays" id="srays"></g>
      <g class="grp sballs" id="sballs"></g>
    </svg>
    <svg class="glyph" viewBox="0 -960 960 960"><path class="outline" d="m330.955-216.328 149.066-89 149.066 90.023-40.305-168.391 131.217-114.347-172.956-14.87L480-671.869l-67.043 158.521-172.956 14.305 131.427 113.796-40.473 168.919ZM212.086-50.608l70.652-305.305L45.52-561.305l312.645-26.579L480-876.176l121.835 288.292 312.645 26.579-237.218 205.392 71.217 305.306L480-213.173 212.086-50.607ZM480-433.87Z"></path><path class="fill" d="m212.086-50.607 70.652-305.306L45.52-561.305l312.871-26.696L480-876.176l121.609 288.175 312.871 26.696-237.218 205.392 71.217 305.306L480-213.173 212.086-50.607Z"></path></svg>
  </button><div class="lbl">Star</div></div>

  <button class="replay" onclick="go()">Replay both</button>
  <script>
    var NS='http://www.w3.org/2000/svg';
    var A=['#ff8ac5','#66c8f5','#f5c542','#71d4c2','#cc8ef5'];   // wave 1 colours
    var B=['#9b8af5','#7ed9c3','#f59ec5','#66c8f5','#ffb347'];   // wave 2 colours
    function dot(g,a,rad,r,fill){var c=document.createElementNS(NS,'circle');c.setAttribute('r',r.toFixed(1));c.setAttribute('cx',(Math.cos(a)*rad).toFixed(1));c.setAttribute('cy',(Math.sin(a)*rad).toFixed(1));c.setAttribute('fill',fill);g.appendChild(c);}
    // heart: two waves of 5, wave2 angle-offset + smaller + wider => reads as clusters/pairs
    var w1=document.getElementById('hw1'),w2=document.getElementById('hw2'),n=5;
    for(var i=0;i<n;i++){var a=(i/n)*Math.PI*2-0.3;dot(w1,a,68,4+Math.random(),A[i%A.length]);dot(w2,a+0.38,82,2.4+Math.random(),B[i%B.length]);}
    // star rays (early) + balls (late), balls land at ray tips
    var sr=document.getElementById('srays'),sb=document.getElementById('sballs'),m=7;
    for(var j=0;j<m;j++){var a2=(j/m)*Math.PI*2;
      var x1=Math.cos(a2)*16,y1=Math.sin(a2)*16,x2=Math.cos(a2)*30,y2=Math.sin(a2)*30;
      var l=document.createElementNS(NS,'line');l.setAttribute('x1',x1.toFixed(1));l.setAttribute('y1',y1.toFixed(1));l.setAttribute('x2',x2.toFixed(1));l.setAttribute('y2',y2.toFixed(1));l.setAttribute('stroke','#f0602a');l.setAttribute('stroke-width','3.5');l.setAttribute('stroke-linecap','round');sr.appendChild(l);
      dot(sb,a2,60,2.2+Math.random()*0.8, j%3?'#ffac33':'#ff9500');}
    function fire(b){b.classList.remove('activate');void b.offsetWidth;b.classList.add('activate');setTimeout(function(){b.classList.remove('activate');},1100);}
    function go(){document.querySelectorAll('.btn').forEach(fire);}
    document.querySelectorAll('.btn').forEach(function(b){b.addEventListener('click',function(){fire(b);});});
  </script>
</body></html>
