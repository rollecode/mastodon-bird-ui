<!doctype html><html><head><meta charset="utf-8"><title>Bird UI fav burst (large proof)</title>
<style>
  body{margin:0;font-family:sans-serif;display:flex;min-height:100vh}
  .pane{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
  .dark{background:#191b22;color:#fff}
  .light{background:#f4f7fb;color:#222}
  .btn{position:relative;width:160px;height:160px;border:0;background:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
  .glyph{width:150px;height:150px;transform-origin:center;z-index:2;position:relative}
  .glyph path{fill:#aab1c4}
  .light .glyph path{fill:#c9d1dc}

  /* HEART */
  .heart.activate .glyph path{fill:#e0245e}
  .heart.activate .glyph{animation:hglyph .85s cubic-bezier(.17,.89,.32,1.28) forwards}
  @keyframes hglyph{0%{transform:scale(1)}10%{transform:scale(0)}28%{transform:scale(0)}55%{transform:scale(1.2)}72%{transform:scale(.92)}100%{transform:scale(1)}}

  /* STAR */
  .star.activate .glyph path{fill:#ffac33}
  .star.activate .glyph{animation:hglyph .85s cubic-bezier(.17,.89,.32,1.28) forwards}

  .burst{position:absolute;left:50%;top:50%;width:360px;height:360px;transform:translate(-50%,-50%);pointer-events:none;z-index:1;overflow:visible}

  .flash{transform-box:fill-box;transform-origin:center;opacity:0}
  .heart .flash{fill:#dd4688}
  .star  .flash{fill:#ffa017}
  .activate .flash{animation:flash .4s ease-out forwards}
  @keyframes flash{0%{transform:scale(0);opacity:1}45%{opacity:.45}80%{opacity:0}100%{transform:scale(1);opacity:0}}

  .ring{fill:none;transform-box:fill-box;transform-origin:center;opacity:0}
  .heart .ring{stroke:#cc8ef5}
  .star  .ring{stroke:#ffa017}
  .activate .ring{animation:ring .55s ease-out .04s forwards}
  @keyframes ring{0%{transform:scale(.25);opacity:0;stroke-width:26}14%{opacity:1}55%{stroke-width:0;transform:scale(1.1);opacity:0}100%{opacity:0}}

  .parts{transform-box:fill-box;transform-origin:center;opacity:0}
  .activate .parts{animation:parts .5s ease-out .13s forwards}
  @keyframes parts{0%{transform:scale(0);opacity:1}65%{opacity:1}100%{transform:scale(1.05);opacity:0}}

  .replay{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#313543;color:#fff;border:0;padding:10px 16px;border-radius:6px;cursor:pointer;z-index:9}
  .lbl{font-size:14px;opacity:.7}
</style></head><body>
  <div class="pane dark">
    <button class="btn heart" id="heart">
      <svg class="burst" viewBox="-100 -100 200 200">
        <circle class="flash" r="46"></circle>
        <circle class="ring" r="30"></circle>
        <g class="parts" id="hp"></g>
      </svg>
      <svg class="glyph" viewBox="0 -960 960 960"><path d="m480-147-43-39q-106-97-175-167T152-585q-23-49-23-94 0-90 60.5-150.5T340-890q53 0 100 25t80 71q33-46 80-71t100-25q90 0 150.5 60.5T911-679q0 45-23 94t-50 100q-41 70-110 140T583-186l-43 39q-12 11-30 11t-30-11Z"></path></svg>
    </button>
    <div class="lbl">Heart (red, rainbow confetti)</div>
  </div>
  <div class="pane light">
    <button class="btn star" id="star">
      <svg class="burst" viewBox="-100 -100 200 200">
        <circle class="flash" r="46"></circle>
        <circle class="ring" r="30"></circle>
        <g class="parts" id="sp"></g>
      </svg>
      <svg class="glyph" viewBox="0 -960 960 960"><path d="m305-704 112-145q12-16 28.5-23.5T480-880q18 0 34.5 7.5T543-849l112 145 170 57q26 8 41 29.5t15 47.5q0 12-3.5 24T866-478L756-322l4 164q1 35-23 58.5T681-76q-2 0-22-3l-179-50-179 50q-5 2-11 2.5t-11 .5q-32 0-56-23.5T200-158l4-164L95-477q-8-11-11.5-23T80-524q0-25 14.5-46.5T135-602l170-102Z"></path></svg>
    </button>
    <div class="lbl">Star (amber, orange sparkle + rays)</div>
  </div>
  <button class="replay" onclick="go()">Replay both</button>
  <script>
    var SVGNS='http://www.w3.org/2000/svg';
    var RAINBOW=['#ff8ac5','#cc8ef5','#66c8f5','#71d4c2','#f5c542','#9b8af5','#f59ec5','#7ed9c3','#ffb347'];
    function heartParts(){var g=document.getElementById('hp');var n=12;for(var i=0;i<n;i++){var a=(i/n)*Math.PI*2;var rad=46+(i%2?6:0);var c=document.createElementNS(SVGNS,'circle');c.setAttribute('r',(2.6+Math.random()*1.4).toFixed(1));c.setAttribute('cx',(Math.cos(a)*rad).toFixed(1));c.setAttribute('cy',(Math.sin(a)*rad).toFixed(1));c.setAttribute('fill',RAINBOW[i%RAINBOW.length]);g.appendChild(c);}}
    function starParts(){var g=document.getElementById('sp');var n=8;
      for(var i=0;i<n;i++){var a=(i/n)*Math.PI*2+0.2;var c=document.createElementNS(SVGNS,'circle');c.setAttribute('r',(1.8+Math.random()*1).toFixed(1));c.setAttribute('cx',(Math.cos(a)*50).toFixed(1));c.setAttribute('cy',(Math.sin(a)*50).toFixed(1));c.setAttribute('fill', i%3? '#ffac33':'#ff9500');g.appendChild(c);}
      for(var j=0;j<6;j++){var a2=(j/6)*Math.PI*2;var x1=Math.cos(a2)*48,y1=Math.sin(a2)*48,x2=Math.cos(a2)*57,y2=Math.sin(a2)*57;var l=document.createElementNS(SVGNS,'line');l.setAttribute('x1',x1.toFixed(1));l.setAttribute('y1',y1.toFixed(1));l.setAttribute('x2',x2.toFixed(1));l.setAttribute('y2',y2.toFixed(1));l.setAttribute('stroke','#ffac33');l.setAttribute('stroke-width','2');l.setAttribute('stroke-linecap','round');g.appendChild(l);}}
    heartParts();starParts();
    function go(){document.querySelectorAll('.btn').forEach(function(b){b.classList.remove('activate');void b.offsetWidth;b.classList.add('activate');});}
    document.querySelectorAll('.btn').forEach(function(b){b.addEventListener('click',go)});go();
  </script>
</body></html>
